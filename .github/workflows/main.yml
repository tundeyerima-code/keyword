name: Update Trends

on:
  schedule:
    - cron: '0 0,12 * * *' # Every 12 hours
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install
        run: npm install
      - name: Generate
        run: node generate.js
      - name: Deploy
        run: |
          git config --global user.name "SEO-Bot"
          git config --global user.email "bot@trend-magnet.ng"
          git add index.html
          git commit -m "Auto-update trends: $(date)" || exit 0
          git push
